# Ephemeral MinIO Configuration for Local Dev
image:
  repository: quay.io/minio/minio
  tag: RELEASE.2024-12-18T13-15-44Z
  pullPolicy: IfNotPresent

mcImage:
  repository: quay.io/minio/mc
  tag: RELEASE.2024-11-21T17-21-54Z
  pullPolicy: IfNotPresent

mode: standalone
persistence:
  enabled: false
service:
  type: LoadBalancer
  port: 9000

consoleService:
  type: LoadBalancer
  port: 9001

# Root credentials
rootUser: admin
rootPassword: password

# Auto-create bucket for Iceberg
buckets:
  - name: iceberg-data
    policy: none
    purge: false

# Resource limits (The chart default is 16Gi, which is too high for local)
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 200m
    memory: 512Mi
