# Custom values for local Kubernetes deployment (Development Mode)
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "latest"
  auth:
    username: airflow
    password: airflow
    database: airflow
  primary:
    persistence:
      enabled: false # Correct path for bitnami/postgresql 13.x
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
  volumePermissions:
    enabled: false

# Redis enabled and persistence disabled
redis:
  enabled: true
  persistence:
    enabled: false

logs:
  persistence:
    enabled: false

workers:
  persistence:
    enabled: false
  # Enable KEDA autoscaling
  keda:
    enabled: true
    pollingInterval: 5 # Check Redis every 5s (default 30s is too slow)
    cooldownPeriod: 30 # Scale down workers 30s after task completion
    minReplicaCount: 1 # Always keep at least 1 worker
    maxReplicaCount: 5 # Maximum workers to prevent system overload

triggerer:
  persistence:
    enabled: false

dagProcessor:
  enabled: true

# Enhanced migrateDatabaseJob and createUserJob
migrateDatabaseJob:
  useHelmHooks: true  # Enforces sequential execution via Helm hooks
  ttlSecondsAfterFinished: 600

createUserJob:
  useHelmHooks: true
  # Default Admin Account Settings (if needed)
  # username: admin
  # password: admin
  # role: Admin
  # email: admin@example.com

# -------------------------------------------------------------
# Local development setting: HostPath Mount
# Maps local dag folder to container's dags folder
# -------------------------------------------------------------
volumes:
  - name: dags-local
    hostPath:
      path: /path/to/project/airflow/dags # Automatically injected by manage-project.sh
      type: Directory

volumeMounts:
  - name: dags-local
    mountPath: /opt/airflow/dags
    readOnly: false # Allow Airflow to write files if needed (e.g. Logs)

# External UI access: Orbstack mapping for localhost:8080 via LoadBalancer
apiServer:
  service:
    type: LoadBalancer

webserver:
  enabled: true
  service:
    type: LoadBalancer # UI Service for Airflow 3.0+
