# kube-prometheus-stack: Lightweight local configuration
# Focused on minimizing resource usage for OrbStack environments.

## Alertmanager: Disabled (Not needed for local development)
alertmanager:
  enabled: false

## Grafana: Enabled (Essential for visualization)
grafana:
  enabled: true
  adminPassword: "admin" # Set default admin password
  # Change port from 80 to 3000 and use LoadBalancer type
  service:
    type: LoadBalancer
    port: 3000
    targetPort: 3000
  # 리소스 제한 (경량화)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

## Kubernetes Control Plane Metrics: Disabled (To save resources)
kubeApiServer:
  enabled: false
kubeLet:
  enabled: false
kubeControllerManager:
  enabled: false
coreDns:
  enabled: false
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

## Node Exporter: Disabled (Redundant for OrbStack 1-node environment)
nodeExporter:
  enabled: false

## Kube State Metrics: Enabled (Crucial for monitoring Pod CPU/Memory)
kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

## Prometheus Operator / Prometheus Server
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus:
  enabled: true
  prometheusSpec:
    # Short retention to save storage and memory
    retention: 1d
    retentionSize: "2GB"
    # Increase interval to reduce CPU spikes
    scrapeInterval: "30s"
    evaluationInterval: "30s"
    
    # Ephemeral storage (reset on restart, local env)
    storageSpec:
      emptyDir:
        medium: "Memory"
        sizeLimit: 1Gi

    # Prometheus memory/CPU resource caps
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1024Mi # Protect system with 1GB limit

# Disable heavy default alerting rules
defaultRules:
  create: false
