apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: iceberg-nessie-test-v2
  namespace: spark
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "apache/spark:3.5.4"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///tmp/script/nessie_test.py"
  sparkVersion: "3.5.4"
  restartPolicy:
    type: Never
  volumes:
    - name: script-vol
      configMap:
        name: spark-iceberg-test-script
    - name: tmp-vol
      emptyDir: {}
  driver:
    cores: 1
    memory: "1g"
    labels:
      version: 3.5.4
    serviceAccount: spark-operator-sa
    env:
      - name: AWS_REGION
        value: us-east-1
    initContainers:
      - name: setup-ivy
        image: busybox
        command:
          ["sh", "-c", "mkdir -p /tmp/cache /tmp/jars && chmod -R 777 /tmp"]
        volumeMounts:
          - name: tmp-vol
            mountPath: /tmp
    volumeMounts:
      - name: script-vol
        mountPath: /tmp/script
      - name: tmp-vol
        mountPath: /tmp
  executor:
    cores: 1
    instances: 1
    memory: "1g"
    initContainers:
      - name: setup-ivy
        image: busybox
        command:
          ["sh", "-c", "mkdir -p /tmp/cache /tmp/jars && chmod -R 777 /tmp"]
        volumeMounts:
          - name: tmp-vol
            mountPath: /tmp
    volumeMounts:
      - name: script-vol
        mountPath: /tmp/script
      - name: tmp-vol
        mountPath: /tmp
  sparkConf:
    # Packages (Use local ivy cache as much as possible if present, but here it might try to download)
    "spark.jars.packages": "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.7.1,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.101.3,org.apache.iceberg:iceberg-aws-bundle:1.7.1"
    "spark.jars.ivy": "/tmp"

    # Iceberg Extensions
    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions"

    # Nessie Catalog Configuration
    "spark.sql.catalog.nessie": "org.apache.iceberg.spark.SparkCatalog"
    "spark.sql.catalog.nessie.uri": "http://nessie.nessie.svc.cluster.local:19120/api/v1"
    "spark.sql.catalog.nessie.ref": "main"
    "spark.sql.catalog.nessie.warehouse": "s3a://iceberg-data/"
    "spark.sql.catalog.nessie.catalog-impl": "org.apache.iceberg.nessie.NessieCatalog"
    "spark.sql.catalog.nessie.io-impl": "org.apache.iceberg.aws.s3.S3FileIO"

    # S3 / MinIO Configuration
    "spark.hadoop.fs.s3a.endpoint": "http://minio.minio.svc.cluster.local:9000"
    "spark.hadoop.fs.s3a.access.key": "admin"
    "spark.hadoop.fs.s3a.secret.key": "password"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"

    # Iceberg S3 properties
    "spark.sql.catalog.nessie.s3.endpoint": "http://minio.minio.svc.cluster.local:9000"
    "spark.sql.catalog.nessie.s3.path-style-access": "true"
    "spark.sql.catalog.nessie.s3.access-key-id": "admin"
    "spark.sql.catalog.nessie.s3.secret-access-key": "password"
    "spark.sql.catalog.nessie.client.region": "us-east-1"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-iceberg-test-script
  namespace: spark
data:
  nessie_test.py: |
    from pyspark.sql import SparkSession
    import sys

    # Initialize Spark
    spark = SparkSession.builder.getOrCreate()

    print("--- Starting Iceberg + Nessie Test ---")

    try:
        # 1. Create Data
        data = [("1", "Alice", 30), ("2", "Bob", 25)]
        df = spark.createDataFrame(data, ["id", "name", "age"])

        # 2. Write to Nessie Catalog (main branch)
        print("Writing to nessie.db.users on 'main' branch...")
        spark.sql("CREATE DATABASE IF NOT EXISTS nessie.db")
        df.writeTo("nessie.db.users").createOrReplace()

        # 3. Verify Write
        print("Reading from nessie.db.users (main branch):")
        spark.table("nessie.db.users").show()

        # 4. Branching Test
        print("Creating branch 'dev'...")
        spark.sql("CREATE BRANCH IF NOT EXISTS dev IN nessie FROM main")
        
        # 5. Switch to dev branch
        print("Switching to 'dev' branch...")
        spark.sql("USE REFERENCE dev IN nessie")

        # 6. Add data to dev branch only
        print("Adding data to 'dev' branch...")
        new_data = [("3", "Charlie", 35)]
        df_new = spark.createDataFrame(new_data, ["id", "name", "age"])
        df_new.writeTo("nessie.db.users").append()

        print("Data in 'dev' branch (Should be 3 rows):")
        spark.table("nessie.db.users").show()

        # 7. Verify isolation (Switch back to main)
        print("Switching back to 'main' branch...")
        spark.sql("USE REFERENCE main IN nessie")
        print("Data in 'main' branch (Should still be 2 rows):")
        spark.table("nessie.db.users").show()

        print("--- Iceberg Isolation Test Successful ---")
        
    except Exception as e:
        print(f"Test Failed: {e}")
        sys.exit(1)
    finally:
        spark.stop()
