apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: iceberg-nessie-restore
  namespace: spark
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "apache/spark:3.5.4"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///tmp/script/restore_data.py"
  sparkVersion: "3.5.4"
  restartPolicy:
    type: Never
  volumes:
    - name: script-vol
      configMap:
        name: spark-restore-script
    - name: tmp-vol
      emptyDir: {}
  driver:
    cores: 1
    memory: "1g"
    labels:
      version: 3.5.4
    serviceAccount: spark-operator-sa
    env:
      - name: AWS_REGION
        value: us-east-1
    initContainers:
      - name: setup-ivy
        image: busybox
        command:
          ["sh", "-c", "mkdir -p /tmp/cache /tmp/jars && chmod -R 777 /tmp"]
        volumeMounts:
          - name: tmp-vol
            mountPath: /tmp
    volumeMounts:
      - name: script-vol
        mountPath: /tmp/script
      - name: tmp-vol
        mountPath: /tmp
  executor:
    cores: 1
    instances: 1
    memory: "1g"
    initContainers:
      - name: setup-ivy
        image: busybox
        command:
          ["sh", "-c", "mkdir -p /tmp/cache /tmp/jars && chmod -R 777 /tmp"]
        volumeMounts:
          - name: tmp-vol
            mountPath: /tmp
    volumeMounts:
      - name: script-vol
        mountPath: /tmp/script
      - name: tmp-vol
        mountPath: /tmp
  sparkConf:
    "spark.jars.packages": "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.7.1,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.101.3,org.apache.iceberg:iceberg-aws-bundle:1.7.1"
    "spark.jars.ivy": "/tmp"
    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions"
    "spark.sql.catalog.nessie": "org.apache.iceberg.spark.SparkCatalog"
    "spark.sql.catalog.nessie.uri": "http://nessie.nessie.svc.cluster.local:19120/api/v1"
    "spark.sql.catalog.nessie.ref": "main"
    "spark.sql.catalog.nessie.warehouse": "s3://iceberg-data/"
    "spark.sql.catalog.nessie.catalog-impl": "org.apache.iceberg.nessie.NessieCatalog"
    "spark.sql.catalog.nessie.io-impl": "org.apache.iceberg.aws.s3.S3FileIO"
    "spark.hadoop.fs.s3a.endpoint": "http://minio.minio.svc.cluster.local:9000"
    "spark.hadoop.fs.s3a.access.key": "admin"
    "spark.hadoop.fs.s3a.secret.key": "password"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
    "spark.sql.catalog.nessie.client.region": "us-east-1"
    "spark.sql.catalog.nessie.s3.endpoint": "http://minio.minio.svc.cluster.local:9000"
    "spark.sql.catalog.nessie.s3.path-style-access": "true"
    "spark.sql.catalog.nessie.s3.access-key-id": "admin"
    "spark.sql.catalog.nessie.s3.secret-access-key": "password"
    "spark.sql.catalog.nessie.s3.region": "us-east-1"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-restore-script
  namespace: spark
data:
  restore_data.py: |
    from pyspark.sql import SparkSession
    from pyspark.sql.types import (
        StructType, StructField, StringType, IntegerType,
        DoubleType, DateType, TimestampType
    )
    from datetime import date, datetime
    import sys

    spark = SparkSession.builder.getOrCreate()
    spark.sparkContext.setLogLevel("WARN")

    print("=== Starting Iceberg + Nessie Sample Data Initialization ===")

    # ------------------------------------------------------------------
    # 0. Namespace Creation
    # ------------------------------------------------------------------
    spark.sql("CREATE DATABASE IF NOT EXISTS nessie.ecommerce")
    print("✅ namespace 'ecommerce' ready")

    # ------------------------------------------------------------------
    # 1. customers table
    # ------------------------------------------------------------------
    print("\n[1/3] Creating customers table...")
    customers_schema = StructType([
        StructField("customer_id",  IntegerType(), False),
        StructField("name",         StringType(),  True),
        StructField("email",        StringType(),  True),
        StructField("country",      StringType(),  True),
        StructField("signup_date",  DateType(),    True),
    ])
    customers_data = [
        (1,  "Alice Kim",       "alice@example.com",   "KR", date(2022, 1, 10)),
        (2,  "Bob Smith",       "bob@example.com",     "US", date(2022, 3, 22)),
        (3,  "Chen Wei",        "chen@example.com",    "CN", date(2022, 5, 5)),
        (4,  "Diana Muller",    "diana@example.com",   "DE", date(2022, 7, 17)),
        (5,  "Ethan Brown",     "ethan@example.com",   "US", date(2022, 9, 30)),
        (6,  "Fiona Park",      "fiona@example.com",   "KR", date(2023, 1, 8)),
        (7,  "George Tanaka",   "george@example.com",  "JP", date(2023, 2, 15)),
        (8,  "Hana Patel",      "hana@example.com",    "IN", date(2023, 4, 3)),
        (9,  "Ivan Petrov",     "ivan@example.com",    "RU", date(2023, 6, 20)),
        (10, "Julia Santos",    "julia@example.com",   "BR", date(2023, 8, 11)),
        (11, "Kevin Johnson",   "kevin@example.com",   "US", date(2023, 10, 5)),
        (12, "Lena Fischer",    "lena@example.com",    "DE", date(2024, 1, 14)),
        (13, "Mike Lee",        "mike@example.com",    "KR", date(2024, 3, 29)),
        (14, "Nina Ivanova",    "nina@example.com",    "RU", date(2024, 5, 7)),
        (15, "Oscar Martínez",  "oscar@example.com",   "MX", date(2024, 7, 22)),
    ]
    df_customers = spark.createDataFrame(customers_data, customers_schema)
    df_customers.writeTo("nessie.ecommerce.customers").createOrReplace()
    print(f"  → {df_customers.count()} rows inserted into customers")

    # ------------------------------------------------------------------
    # 2. products table
    # ------------------------------------------------------------------
    print("\n[2/3] Creating products table...")
    products_schema = StructType([
        StructField("product_id",   IntegerType(), False),
        StructField("name",         StringType(),  True),
        StructField("category",     StringType(),  True),
        StructField("price",        DoubleType(),  True),
        StructField("stock",        IntegerType(), True),
    ])
    products_data = [
        (101, "Laptop Pro 15",       "Electronics",  1299.99, 50),
        (102, "Wireless Mouse",      "Electronics",    29.99, 200),
        (103, "USB-C Hub 7-port",    "Electronics",    59.99, 150),
        (104, "Mechanical Keyboard", "Electronics",   129.99, 80),
        (105, "4K Monitor 27\"",     "Electronics",   399.99, 30),
        (201, "Standing Desk",       "Furniture",     499.99, 20),
        (202, "Ergonomic Chair",     "Furniture",     349.99, 25),
        (203, "Desk Lamp LED",       "Furniture",      49.99, 100),
        (301, "Python Cookbook",     "Books",          42.00, 300),
        (302, "Data Engineering",    "Books",          55.00, 180),
        (303, "System Design",       "Books",          48.00, 220),
        (401, "Running Shoes",       "Sports",        119.99, 60),
        (402, "Yoga Mat",            "Sports",         29.99, 120),
        (403, "Resistance Bands",    "Sports",         19.99, 250),
    ]
    df_products = spark.createDataFrame(products_data, products_schema)
    df_products.writeTo("nessie.ecommerce.products").createOrReplace()
    print(f"  → {df_products.count()} rows inserted into products")

    # ------------------------------------------------------------------
    # 3. orders table (Core fact table)
    # ------------------------------------------------------------------
    print("\n[3/3] Creating orders table...")
    orders_schema = StructType([
        StructField("order_id",     IntegerType(), False),
        StructField("customer_id",  IntegerType(), True),
        StructField("product_id",   IntegerType(), True),
        StructField("quantity",     IntegerType(), True),
        StructField("unit_price",   DoubleType(),  True),
        StructField("total_amount", DoubleType(),  True),
        StructField("status",       StringType(),  True),
        StructField("order_date",   DateType(),    True),
    ])
    orders_data = [
        (1001, 1,  101, 1, 1299.99, 1299.99, "completed",  date(2023, 1, 15)),
        (1002, 2,  102, 2,   29.99,   59.98, "completed",  date(2023, 2, 3)),
        (1003, 3,  201, 1,  499.99,  499.99, "completed",  date(2023, 3, 20)),
        (1004, 1,  103, 1,   59.99,   59.99, "completed",  date(2023, 4, 11)),
        (1005, 4,  105, 2,  399.99,  799.98, "completed",  date(2023, 5, 7)),
        (1006, 5,  301, 3,   42.00,  126.00, "completed",  date(2023, 6, 14)),
        (1007, 6,  202, 1,  349.99,  349.99, "completed",  date(2023, 7, 28)),
        (1008, 7,  401, 2,  119.99,  239.98, "completed",  date(2023, 8, 5)),
        (1009, 8,  104, 1,  129.99,  129.99, "completed",  date(2023, 9, 19)),
        (1010, 2,  302, 1,   55.00,   55.00, "completed",  date(2023, 10, 2)),
        (1011, 9,  403, 3,   19.99,   59.97, "completed",  date(2023, 11, 23)),
        (1012, 10, 203, 2,   49.99,   99.98, "completed",  date(2023, 12, 1)),
        (1013, 11, 101, 1, 1299.99, 1299.99, "processing", date(2024, 1, 9)),
        (1014, 12, 402, 2,   29.99,   59.98, "processing", date(2024, 2, 17)),
        (1015, 3,  303, 1,   48.00,   48.00, "completed",  date(2024, 3, 4)),
        (1016, 13, 105, 1,  399.99,  399.99, "shipped",    date(2024, 4, 22)),
        (1017, 6,  102, 3,   29.99,   89.97, "completed",  date(2024, 5, 8)),
        (1018, 14, 201, 1,  499.99,  499.99, "cancelled",  date(2024, 6, 15)),
        (1019, 5,  401, 1,  119.99,  119.99, "shipped",    date(2024, 7, 30)),
        (1020, 15, 104, 2,  129.99,  259.98, "processing", date(2024, 8, 12)),
    ]
    df_orders = spark.createDataFrame(orders_data, orders_schema)
    df_orders.writeTo("nessie.ecommerce.orders").createOrReplace()
    print(f"  → {df_orders.count()} rows inserted into orders")

    # ------------------------------------------------------------------
    # Verification
    # ------------------------------------------------------------------
    print("\n=== Verification ===")
    for tbl in ["customers", "products", "orders"]:
        cnt = spark.sql(f"SELECT COUNT(*) AS cnt FROM nessie.ecommerce.{tbl}").collect()[0]["cnt"]
        print(f"  nessie.ecommerce.{tbl}: {cnt} rows ✅")

    # Simple aggregation verification
    print("\n[Revenue by Category (TOP 5)]")
    spark.sql("""
        SELECT p.category,
               COUNT(o.order_id)       AS order_count,
               ROUND(SUM(o.total_amount), 2) AS total_revenue
        FROM nessie.ecommerce.orders o
        JOIN nessie.ecommerce.products p ON o.product_id = p.product_id
        WHERE o.status != 'cancelled'
        GROUP BY p.category
        ORDER BY total_revenue DESC
        LIMIT 5
    """).show()

    print("=== Sample Data Initialization Completed Successfully ===")
    spark.stop()
