apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-thrift-server
  namespace: spark
  labels:
    app: spark-thrift-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-thrift-server
  template:
    metadata:
      labels:
        app: spark-thrift-server
    spec:
      serviceAccountName: spark-operator-sa
      initContainers:
        - name: setup-dirs
          image: busybox
          command: ["sh", "-c", "mkdir -p /tmp/ivy && chmod -R 777 /tmp"]
          volumeMounts:
            - name: tmp-vol
              mountPath: /tmp
      containers:
        - name: thrift-server
          image: apache/spark:3.5.4
          command:
            - /opt/spark/bin/spark-submit
          args:
            - --class
            - org.apache.spark.sql.hive.thriftserver.HiveThriftServer2
            - --master
            - local[*]
            - --packages
            - org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.7.1,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.101.3,org.apache.iceberg:iceberg-aws-bundle:1.7.1
            - --conf
            - spark.jars.ivy=/tmp/ivy
            - --conf
            - spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions
            - --conf
            - spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
            - --conf
            - spark.sql.catalog.nessie.uri=http://nessie.nessie.svc.cluster.local:19120/api/v1
            - --conf
            - spark.sql.catalog.nessie.ref=main
            - --conf
            - spark.sql.catalog.nessie.warehouse=s3://iceberg-data/
            - --conf
            - spark.sql.catalog.nessie.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
            - --conf
            - spark.sql.catalog.nessie.io-impl=org.apache.iceberg.aws.s3.S3FileIO
            - --conf
            - spark.hadoop.fs.s3a.endpoint=http://minio.minio.svc.cluster.local:9000
            - --conf
            - spark.hadoop.fs.s3a.access.key=admin
            - --conf
            - spark.hadoop.fs.s3a.secret.key=password
            - --conf
            - spark.hadoop.fs.s3a.path.style.access=true
            - --conf
            - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
            - --conf
            - spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
            - --conf
            - spark.sql.catalog.nessie.client.region=us-east-1
            - --conf
            - spark.sql.catalog.nessie.s3.endpoint=http://minio.minio.svc.cluster.local:9000
            - --conf
            - spark.sql.catalog.nessie.s3.path-style-access=true
            - --conf
            - spark.sql.catalog.nessie.s3.access-key-id=admin
            - --conf
            - spark.sql.catalog.nessie.s3.secret-access-key=password
            - --conf
            - spark.sql.catalog.nessie.s3.region=us-east-1
            - --conf
            - spark.driver.bindAddress=0.0.0.0
            - --conf
            - spark.ui.port=4040
            - --conf
            - hive.server2.thrift.port=10000
            - --conf
            - hive.server2.thrift.bind.host=0.0.0.0
            - spark-internal
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
            - name: AWS_REGION
              value: us-east-1
          volumeMounts:
            - name: tmp-vol
              mountPath: /tmp
          ports:
            - containerPort: 10000
              name: thrift
            - containerPort: 4040
              name: spark-ui
          livenessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 90
            periodSeconds: 10
      volumes:
        - name: tmp-vol
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spark-thrift-server
  namespace: spark
spec:
  type: LoadBalancer
  ports:
    - name: thrift
      port: 10000
      targetPort: 10000
    - name: spark-ui
      port: 4040
      targetPort: 4040
  selector:
    app: spark-thrift-server
