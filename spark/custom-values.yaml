# Spark Operator Configuration (Kubeflow)
# https://github.com/kubeflow/spark-operator

# 0. Global Image Settings (Local Image Only)
image:
  registry: ghcr.io
  repository: kubeflow/spark-operator/controller
  tag: "2.4.0"
  pullPolicy: IfNotPresent

# 1. Controller Settings
controller:
  replicas: 1
  # Resource limits (local environment)
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Enable Webhook (SparkApplication validation/mutation)
  webhook:
    enable: true

# 2. Spark Job Namespaces
spark:
  # List of namespaces watched by Spark Operator
  # Must include 'spark' to manage jobs in that namespace
  jobNamespaces:
    - "spark"
    - "airflow"
    - "default"

  # Automatically create ServiceAccount for Spark Jobs
  serviceAccount:
    create: true
    name: "spark-operator-sa"

# 3. Webhook Settings
webhook:
  enable: true
  replicas: 1
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# 4. Metrics
prometheus:
  metrics:
    enable: false # Disabled for local environment (enable if needed)
