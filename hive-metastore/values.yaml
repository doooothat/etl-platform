# Hive Metastore Configuration
image:
  repository: apache/hive
  tag: "4.0.0" # Official image
  pullPolicy: IfNotPresent

postgresqlClient:
  repository: docker.io/bitnami/postgresql
  tag: "latest"
  pullPolicy: IfNotPresent

# DB Connection (Currently pointing to Airflow's Postgres)
database:
  type: "postgres"
  host: "airflow-postgresql.airflow.svc.cluster.local"
  port: 5432
  user: "airflow"
  password: "airflow"
  name: "metastore"
  bootstrapDatabase: "airflow"

# Storage (MinIO)
s3:
  endpoint: "http://minio.minio.svc.cluster.local:9000"
  accessKey: "admin"
  secretKey: "password"
  pathStyleAccess: "true"
  warehouseDir: "s3a://iceberg-data/hive-warehouse"

service:
  port: 9083

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "2Gi"
