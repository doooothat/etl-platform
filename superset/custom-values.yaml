# Superset Clean Installation (ARM Mac)
# Sample data is served via Trino → Iceberg/Nessie (NOT SQLite or postgres-analytics)

runAsUser: 0

image:
  repository: apachesuperset.docker.scarf.sh/apache/superset
  tag: "5.0.0"
  digest: "sha256:09735adaae3945c5a8fabbeca31a7954c8c74de195702ba61622aee8604d5c55"
  pullPolicy: IfNotPresent

initImage:
  repository: apache/superset
  tag: dockerize
  digest: "sha256:afe59523a6c8774c3b16d0f44146b2e52f327a7d26a47b4cc63b904fcdedf057"

bootstrapScript: |
  #!/bin/bash
  set -e
  echo "--- Bootstrap Start ---"
  if [ -f /app/.venv/bin/activate ]; then
    . /app/.venv/bin/activate
  fi
  echo "Installing psycopg2-binary..."
  pip install psycopg2-binary --target /app/.venv/lib/python3.10/site-packages
  echo "Installing sqlalchemy-trino (for Trino/Iceberg/Nessie connectivity)..."
  pip install sqlalchemy-trino --target /app/.venv/lib/python3.10/site-packages
  echo "--- Bootstrap End ---"

configOverrides:
  secret: |
    SECRET_KEY = 'fresh-start-key'
  db_connection: |
    SQLALCHEMY_DATABASE_URI = 'postgresql://superset:superset@superset-postgresql:5432/superset'
  sqllab_config: |
    # SQL Lab 및 로컬 개발용 보안 설정
    WTF_CSRF_ENABLED = False
    TALISMAN_CONFIG = {"force_https": False, "frame_options": "ALLOWFROM", "content_security_policy": None}

    # Feature Flags
    FEATURE_FLAGS = {
        "SQLLAB_BACKEND_PERSISTENCE": True,
        "SQL_EXPLORER": True,
        "EMBEDDED_SUPERSET": True,
    }

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "18.3.0"
    digest: "sha256:9b62e6057d781853916a712ad2591a607de4529160e07c2eaf58d75ef6c45b9d"
  auth:
    username: superset
    password: superset
    database: superset
  primary:
    persistence:
      enabled: false # Ensure absolutely clean start every time for this test
    readinessProbe: { enabled: false }
    livenessProbe: { enabled: false }
    startupProbe: { enabled: false }
    podSecurityContext: { enabled: false }
    containerSecurityContext: { enabled: false }
  volumePermissions: { enabled: false }

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: "8.4.0"
    digest: "sha256:412da89feed59b1a45b0c1fd9d07cdb2e2283cf4db2e5a1604762ad03d53af6d"
  auth: { enabled: false }
  master:
    persistence:
      enabled: false
    podSecurityContext: { enabled: false }
    containerSecurityContext: { enabled: false }

init:
  initContainers: [] # Bypass hang
  createAdmin: true
  adminUser:
    username: admin
    firstname: Superset
    lastname: Admin
    email: admin@superset.com
    password: admin
  initDb: true
  loadExamples: false # Sample data lives in Iceberg/Nessie, loaded via Spark + queried via Trino
  command:
    - "/bin/sh"
    - "-c"
    - ". {{ .Values.configMountPath }}/superset_bootstrap.sh; . {{ .Values.configMountPath }}/superset_init.sh"

service:
  type: LoadBalancer
  port: 8088
  nodePort:
    http: null

ingress:
  enabled: false
