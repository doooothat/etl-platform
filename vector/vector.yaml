---
# ──────────────────────────────────────────────────────────────────────────────
# Vector RBAC: Permissions to read K8s metadata and logs
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: vector
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: vector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: vector

---
# ──────────────────────────────────────────────────────────────────────────────
# Vector Config: Source (K8s logs) -> Sink (Kafka)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: vector
data:
  vector.yaml: |
    sources:
      kubernetes_logs:
        type: "kubernetes_logs"
        # 제외하고 싶은 네임스페이스가 있다면 여기에 추가 (예: kube-system 등)

    transforms:
      # 로그 형식 정제 (필요시 추가)
      parse_logs:
        type: "remap"
        inputs: ["kubernetes_logs"]
        source: |
          .processed_at = now()
          # 필요 없는 필드 제거 (용량 최적화)
          del(.kubernetes.pod_labels)
          del(.kubernetes.node_labels)

    sinks:
      kafka_sink:
        type: "kafka"
        inputs: ["parse_logs"]
        bootstrap_servers: "kafka-0.kafka-headless.kafka.svc.cluster.local:9092"
        topic: "k8s_logs"
        compression: "gzip"
        encoding:
          codec: "json"
        # 카프카가 잠시 죽더라도 유실되지 않게 내부 버퍼링
        buffer:
          type: "memory"
          max_events: 1000

---
# ──────────────────────────────────────────────────────────────────────────────
# Vector DaemonSet: One pod per node
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: vector
  labels:
    app: vector
spec:
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: vector
      containers:
        - name: vector
          image: timberio/vector:0.34.1-distroless-libc
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/vector/vector.yaml"]
          env:
            - name: VECTOR_LOG
              value: "info"
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: data
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
